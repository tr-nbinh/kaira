@if (blogs.length) {
<section class="blog py-5">
    <div class="container">
        <div class="d-flex flex-wrap justify-content-between align-items-center mt-5 mb-3">
            <h4 class="text-uppercase">{{'BLOG.TITLE' | translate }}</h4>
            <a routerLink="/blog" class="fancy-link text-uppercase">{{'BLOG.LINK' | translate }}</a>
        </div>
        <app-blog-list [blogs]="blogs" [colClass]="'col-md-4'"></app-blog-list>
    </div>
</section>
}
